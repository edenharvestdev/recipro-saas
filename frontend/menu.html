<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>เมนูร้าน — สั่งออนไลน์</title>
<style>
  /* ===== ธีม/กรอบเมนู (เลือกได้หลายแบบ — ค่าเริ่มต้น = ธีม recipro เดิม) ===== */
  :root{
    --m-bg1:#fff7f2; --m-bg2:#f6f4fb; --m-head1:#fff; --m-head2:#fef3ec;
    --m-accent:#7c3aed; --m-accent2:#8b5cf6; --m-accent3:#ec4899;
    --m-card:#fff; --m-cardr:20px; --m-cardbd:0px solid transparent; --m-cardsh:0 4px 18px rgba(80,60,120,.10);
    --m-price:#16a34a; --m-text:#1a1a1a; --m-muted:#9a8aa8;
  }
  html[data-theme="matcha"]{--m-bg1:#f3f8f0;--m-bg2:#e9f2e4;--m-head1:#fff;--m-head2:#eef6ea;--m-accent:#3f7d4f;--m-accent2:#5a9a68;--m-accent3:#86b049;--m-price:#2f7d32;--m-muted:#7c9a82}
  html[data-theme="white"]{--m-bg1:#ffffff;--m-bg2:#f6f6f3;--m-head1:#fff;--m-head2:#fbfbf8;--m-accent:#6f8f7d;--m-accent2:#86a594;--m-accent3:#a9c4b4;--m-price:#2f7d32;--m-muted:#9a9a93}
  html[data-theme="butter"]{--m-bg1:#fffdf5;--m-bg2:#fbf3df;--m-head1:#fff;--m-head2:#fdf6e6;--m-accent:#c79a3e;--m-accent2:#d8b25e;--m-accent3:#e6c97f;--m-price:#5d7a3a;--m-muted:#ad9e76}
  html[data-theme="sakura"]{--m-bg1:#fff5f7;--m-bg2:#fdeef4;--m-head1:#fff;--m-head2:#ffeef4;--m-accent:#d94f86;--m-accent2:#ec6fa0;--m-accent3:#f5a3c0;--m-price:#e0457a;--m-muted:#c08aa0}
  html[data-theme="ocean"]{--m-bg1:#eef6fb;--m-bg2:#e3f0f7;--m-head1:#fff;--m-head2:#e9f3f9;--m-accent:#2b7fae;--m-accent2:#3f9cc9;--m-accent3:#5bb3d4;--m-price:#1f8a8a;--m-muted:#7d9bab}
  html[data-theme="mono"]{--m-bg1:#f5f5f4;--m-bg2:#eeeeec;--m-head1:#fff;--m-head2:#f4f4f2;--m-accent:#2b2b2b;--m-accent2:#444;--m-accent3:#777;--m-price:#111;--m-muted:#999}
  html[data-theme="earth"]{--m-bg1:#f4efe6;--m-bg2:#ece3d4;--m-head1:#fff;--m-head2:#f1e9dc;--m-accent:#a4582f;--m-accent2:#bd6f3e;--m-accent3:#cf9b56;--m-price:#5d7a3a;--m-muted:#a08c74}
  /* กรอบการ์ด */
  html[data-frame="sharp"]{--m-cardr:7px;--m-cardbd:1px solid rgba(0,0,0,.10);--m-cardsh:0 2px 8px rgba(0,0,0,.07)}
  html[data-frame="bold"]{--m-cardr:18px;--m-cardbd:2.5px solid var(--m-accent);--m-cardsh:0 4px 14px rgba(0,0,0,.10)}
  html[data-frame="ticket"]{--m-cardr:16px;--m-cardbd:2px dashed var(--m-accent);--m-cardsh:none}
  html[data-frame="polaroid"]{--m-cardr:8px;--m-cardbd:1px solid rgba(0,0,0,.08);--m-cardsh:0 6px 16px rgba(0,0,0,.14)}
  *{box-sizing:border-box;margin:0;font-family:'Sarabun','Segoe UI',system-ui,sans-serif}
  body{background:linear-gradient(180deg,var(--m-bg1) 0%,var(--m-bg2) 100%);color:var(--m-text);padding-bottom:96px;min-height:100vh}
  header{background:linear-gradient(135deg,var(--m-head1),var(--m-head2));padding:18px 16px;position:sticky;top:0;z-index:5;box-shadow:0 2px 12px rgba(124,58,237,.08);border-bottom:1px solid rgba(124,58,237,.06)}
  header h1{font-size:21px;font-weight:800} header .sub{font-size:12px;color:var(--m-muted);margin-top:3px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(132px,1fr));gap:11px;padding:14px}
  .card{background:var(--m-card);border-radius:var(--m-cardr);border:var(--m-cardbd);overflow:hidden;box-shadow:var(--m-cardsh);display:flex;flex-direction:column;transition:transform .15s,box-shadow .15s;animation:pop .35s ease both;cursor:pointer}
  @keyframes pop{from{opacity:0;transform:translateY(10px) scale(.97)}to{opacity:1;transform:none}}
  .card:active{transform:scale(.97)}
  /* การ์ดใหม่: รูปด้านบนล้วน ๆ (ไม่มีตัวอักษรทับรูป) แล้วชื่อ/ราคา/ป้ายอยู่ใต้รูป — อ่านง่ายทั้งมือถือและจอเคาน์เตอร์ */
  .card .img{height:118px;background:#eee center/cover no-repeat;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .card .img .ph{font-size:30px;font-weight:900;color:rgba(255,255,255,.92);letter-spacing:1px}
  .card .nm{font-size:14px;font-weight:800;line-height:1.25;color:var(--m-text);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:2.4em}
  .card .badges{display:flex;flex-wrap:wrap;gap:4px}
  .card .bdg{font-size:9.5px;font-weight:800;padding:2px 7px;border-radius:20px;background:var(--m-head2);color:var(--m-accent);letter-spacing:.2px;line-height:1.5}
  .card .bdg.opt{background:rgba(124,58,237,.10)} .card .bdg.hot{background:#fee2e2;color:#dc2626} .card .bdg.new{background:#dcfce7;color:#16a34a} .card .bdg.reco{background:#fef3c7;color:#b45309} .card .bdg.limited{background:#ede9fe;color:#6d28d9} .card .bdg.seasonal{background:#e0f2fe;color:#0369a1} .card .bdg.promo{background:#ffe4e6;color:#be123c}
  .card .pr-row{display:flex;align-items:baseline;justify-content:space-between;gap:6px;margin-top:auto}
  .card .more{font-size:11px;color:var(--m-accent);font-weight:700;white-space:nowrap}
  .sheet .sd-img{display:block;width:100%;max-height:38vh;height:auto;object-fit:contain;border-radius:14px;margin:0 auto 10px;background:var(--m-bg2)}
  .sheet .sd-desc{font-size:14px;color:#555;line-height:1.55;margin:8px 0;white-space:pre-line}
  .sheet .sd-rev{display:inline-flex;align-items:center;gap:4px;font-size:13px;color:var(--m-accent);font-weight:700;text-decoration:none;margin-bottom:4px}
  .card .b{padding:10px 12px 12px;flex:1;display:flex;flex-direction:column;gap:6px}
  .card .desc{font-size:11.5px;color:var(--m-muted);line-height:1.4;max-height:32px;overflow:hidden}
  .card .pr{font-size:18px;font-weight:900;color:var(--m-price)}
  .card .rev{font-size:11px;color:var(--m-accent);text-decoration:none;font-weight:700;display:inline-flex;align-items:center;gap:3px}
  .add{margin-top:auto;border:none;background:linear-gradient(135deg,var(--m-accent2),var(--m-accent));color:#fff;border-radius:13px;padding:10px;font-size:14px;font-weight:800;cursor:pointer;box-shadow:0 3px 10px rgba(124,58,237,.28)}
  .cat{padding:8px 14px 0;font-size:14px;font-weight:800;color:var(--m-accent);grid-column:1/-1;display:flex;align-items:center;gap:7px}
  .cat::before{content:'';width:6px;height:18px;background:linear-gradient(var(--m-accent2),var(--m-accent3));border-radius:6px}
  /* 📁 แท็บโฟลเดอร์ตามหมวด */
  .foldertabs{display:flex;gap:0;overflow-x:auto;padding:10px 12px 0;scrollbar-width:none;-webkit-overflow-scrolling:touch}
  .foldertabs::-webkit-scrollbar{display:none}
  .ftab{flex:0 0 auto;border:none;background:var(--m-head2);color:var(--m-accent);font-size:13px;font-weight:800;padding:9px 16px;border-radius:12px 12px 0 0;cursor:pointer;margin-right:4px;box-shadow:inset 0 -3px 0 rgba(0,0,0,.05);opacity:.7;transition:opacity .15s,transform .15s;position:relative;top:2px}
  .ftab.on{opacity:1;background:var(--m-card);color:var(--m-accent);box-shadow:0 -2px 8px rgba(0,0,0,.08);top:0;border-bottom:3px solid var(--m-accent)}
  /* ตำแหน่งแถบหมวด: ซ้าย/ขวา (ค่าเริ่มต้น = บน) */
  body[data-tabpos="left"] #gridwrap, body[data-tabpos="right"] #gridwrap{display:flex;align-items:flex-start;gap:10px}
  body[data-tabpos="right"] #gridwrap{flex-direction:row-reverse}
  body[data-tabpos="left"] #gridwrap .grid, body[data-tabpos="right"] #gridwrap .grid{flex:1;min-width:0}
  body[data-tabpos="left"] .foldertabs, body[data-tabpos="right"] .foldertabs{flex-direction:column;overflow-x:visible;overflow-y:auto;flex:0 0 132px;width:132px;padding:14px 0 14px 12px;position:sticky;top:8px;max-height:90vh}
  body[data-tabpos="right"] .foldertabs{padding:14px 12px 14px 0}
  body[data-tabpos="left"] .ftab, body[data-tabpos="right"] .ftab{width:100%;text-align:left;border-radius:10px;margin:0 0 5px 0;top:0;box-shadow:none;padding:10px 12px}
  body[data-tabpos="left"] .ftab.on, body[data-tabpos="right"] .ftab.on{border-bottom:none;border-left:3px solid var(--m-accent);box-shadow:0 2px 8px rgba(0,0,0,.08)}
  /* 🧭 แถบหมวดด่วน (sticky) + ปุ่มดูหมวดทั้งหมด */
  body[data-tabpos="top"] .foldertabs{position:sticky;top:0;z-index:6;background:linear-gradient(180deg,var(--m-bg1) 70%,rgba(255,255,255,0));padding:9px 12px 4px}
  .toc-btn{flex:0 0 auto;border:1px solid rgba(124,58,237,.28);background:var(--m-card);color:var(--m-accent);font-size:12.5px;font-weight:800;padding:9px 13px;border-radius:12px;cursor:pointer;margin-right:6px;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
  /* 📚 ลิ้นชักสารบัญหมวด (ToC) */
  #tocModal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-end;z-index:20}
  #tocModal.open{display:flex}
  #tocModal .toc-sheet{background:#fff;width:100%;max-height:78vh;overflow:auto;border-radius:20px 20px 0 0;padding:16px 16px 24px}
  #tocModal .toc-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
  #tocModal .toc-h b{font-size:17px;color:var(--m-accent)}
  #tocModal .toc-x{border:none;background:#f1eef8;color:var(--m-accent);width:34px;height:34px;border-radius:10px;font-size:18px;font-weight:800;cursor:pointer}
  #tocModal .toc-item{display:flex;align-items:center;gap:10px;width:100%;text-align:left;border:none;background:var(--m-head2);border-radius:12px;padding:13px 14px;margin-top:8px;font-size:15px;font-weight:700;color:var(--m-text);cursor:pointer}
  #tocModal .toc-item .cnt{margin-left:auto;font-size:12px;color:var(--m-muted);font-weight:700;background:#fff;border-radius:20px;padding:2px 9px}
  #tocModal .toc-item .dot{width:9px;height:20px;border-radius:5px;background:linear-gradient(var(--m-accent2),var(--m-accent3))}
  /* ✨ ปุ่มเปิดไฮไลต์อีกครั้ง (อยู่ในหัวเมนู) */
  .hl-chip{display:inline-flex;align-items:center;gap:5px;margin-top:8px;border:none;background:linear-gradient(135deg,var(--m-accent2),var(--m-accent));color:#fff;font-size:12.5px;font-weight:800;padding:7px 14px;border-radius:20px;cursor:pointer;box-shadow:0 3px 10px rgba(124,58,237,.28)}
  /* 🎉 Marketing Showcase (สูงสุด 4 สไลด์) ก่อนเข้าเมนู */
  #showcase{position:fixed;inset:0;background:linear-gradient(180deg,var(--m-bg1),var(--m-bg2));z-index:30;display:none;flex-direction:column}
  #showcase.open{display:flex}
  .sc-top{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 6px}
  .sc-top .sc-skip{border:none;background:rgba(0,0,0,.06);color:var(--m-muted);font-size:13px;font-weight:800;padding:8px 15px;border-radius:20px;cursor:pointer}
  .sc-stage{flex:1;overflow:hidden;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:4px 16px}
  .sc-card{width:100%;max-width:520px;background:var(--m-card);border-radius:22px;box-shadow:0 10px 34px rgba(80,60,120,.20);overflow:hidden;display:flex;flex-direction:column;animation:pop .3s ease both}
  .sc-card .sc-hero{width:100%;aspect-ratio:4/3;object-fit:cover;background:linear-gradient(135deg,var(--m-accent2),var(--m-accent3));display:block}
  .sc-card .sc-badge{align-self:flex-start;margin:14px 16px 0;background:var(--m-accent);color:#fff;font-size:11px;font-weight:800;padding:4px 12px;border-radius:20px;letter-spacing:.3px}
  .sc-card .sc-tt{font-size:21px;font-weight:900;color:var(--m-text);margin:10px 16px 0;line-height:1.25}
  .sc-card .sc-ds{font-size:14px;color:#555;line-height:1.55;margin:8px 16px 0;white-space:pre-line}
  .sc-card .sc-cta{margin:16px;border:none;background:linear-gradient(135deg,var(--m-accent2),var(--m-accent));color:#fff;border-radius:15px;padding:14px;font-size:16px;font-weight:900;cursor:pointer;box-shadow:0 5px 16px rgba(124,58,237,.30)}
  .sc-nav{flex:0 0 auto;display:flex;align-items:center;justify-content:center;gap:16px;padding:10px 16px}
  .sc-nav button{border:none;background:var(--m-card);color:var(--m-accent);width:44px;height:44px;border-radius:50%;font-size:24px;font-weight:900;cursor:pointer;box-shadow:0 3px 12px rgba(80,60,120,.16)}
  .sc-nav button:disabled{opacity:.3;cursor:default}
  .sc-dots{display:flex;gap:7px}
  .sc-dots i{width:9px;height:9px;border-radius:50%;background:rgba(124,58,237,.25);cursor:pointer;transition:transform .15s}
  .sc-dots i.on{background:var(--m-accent);transform:scale(1.25)}
  .sc-foot{flex:0 0 auto;text-align:center;padding:2px 16px 18px}
  .sc-foot button{border:none;background:transparent;color:var(--m-accent);font-size:14px;font-weight:800;cursor:pointer;text-decoration:underline;padding:8px}
  /* 🖥 kiosk mode (วางหน้าร้าน touchscreen) */
  body.kiosk .viewtoggle{display:none}
  body.kiosk .grid{grid-template-columns:repeat(auto-fill,minmax(190px,1fr))}
  body.kiosk .card .img{height:150px}
  body.kiosk .card .nm{font-size:16.5px} body.kiosk .card .pr{font-size:21px} body.kiosk .card .more{font-size:13px}
  /* 🥕 loader */
  #loader{position:fixed;inset:0;background:linear-gradient(180deg,#fff7f2,#f6f4fb);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:50;gap:14px}
  #loader.hide{opacity:0;pointer-events:none;transition:opacity .4s}
  .carrot{font-size:64px;animation:spin 1.1s cubic-bezier(.5,.1,.5,.9) infinite;transform-origin:50% 55%}
  @keyframes spin{0%{transform:rotate(0) scale(1)}50%{transform:rotate(180deg) scale(1.12)}100%{transform:rotate(360deg) scale(1)}}
  /* 🐇 กระต่ายวิ่ง */
  .bunscene{position:relative;width:190px;height:104px;overflow:hidden}
  .bun{position:absolute;left:50%;margin-left:-28px;bottom:22px;font-size:54px;line-height:1;animation:hop .5s ease-in-out infinite;transform-origin:50% 92%;filter:drop-shadow(0 6px 4px rgba(124,58,237,.18))}
  @keyframes hop{0%,100%{transform:translateY(0) rotate(-6deg) scaleX(1)}42%{transform:translateY(-26px) rotate(7deg) scaleX(.95)}}
  .carrot3{position:absolute;right:14px;bottom:26px;font-size:30px;animation:bobc .5s ease-in-out infinite;transform-origin:50% 90%}
  @keyframes bobc{0%,100%{transform:translateY(0) rotate(8deg)}50%{transform:translateY(-7px) rotate(-4deg)}}
  .ground{position:absolute;left:0;right:0;bottom:16px;height:4px;background:repeating-linear-gradient(90deg,#d9c9f2 0 12px,transparent 12px 24px);border-radius:4px;animation:groundmove .3s linear infinite}
  @keyframes groundmove{from{background-position:0 0}to{background-position:-24px 0}}
  .puff{position:absolute;left:56%;bottom:18px;font-size:15px;animation:puff .5s ease-out infinite}
  @keyframes puff{0%{opacity:.55;transform:translateX(0) scale(.7)}100%{opacity:0;transform:translateX(-30px) scale(1.25)}}
  #loader .lt{font-size:15px;color:#9a8aa8;font-weight:700;letter-spacing:.5px}
  .dots::after{content:'';animation:dots 1.2s steps(4,end) infinite}
  @keyframes dots{0%{content:''}25%{content:'.'}50%{content:'..'}75%{content:'...'}}
  .cartbar{position:fixed;left:0;right:0;bottom:0;background:#fff;box-shadow:0 -2px 10px rgba(0,0,0,.1);padding:12px 16px;display:flex;gap:10px;align-items:center}
  .cartbar b{flex:1;font-size:15px}
  .cartbar button{border:none;background:var(--m-price);color:#fff;border-radius:12px;padding:12px 18px;font-size:15px;font-weight:800;cursor:pointer}
  .cartbar button:disabled{background:#ccc}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:flex-end;z-index:10}
  .modal.open{display:flex} .sheet{background:#fff;width:100%;max-height:85vh;overflow:auto;border-radius:18px 18px 0 0;padding:18px}
  .row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #eee;font-size:14px}
  .row .q{display:flex;align-items:center;gap:6px} .row .q button{width:28px;height:28px;border-radius:8px;border:1px solid #ddd;background:#fff;font-size:16px;cursor:pointer}
  input,textarea{width:100%;padding:10px;border:1px solid #ddd;border-radius:10px;font-size:15px;margin-top:8px}
  .paybtn{width:100%;border:none;background:var(--m-accent);color:#fff;border-radius:12px;padding:14px;font-size:16px;font-weight:800;margin-top:12px;cursor:pointer}
  .done{text-align:center;padding:30px 16px} .done .qn{font-size:54px;font-weight:900;color:var(--m-accent);margin:10px 0}
  .muted{color:#888;font-size:13px}
  /* 📖 flipbook */
  .viewtoggle{position:absolute;right:14px;top:16px;display:flex;gap:4px;background:rgba(124,58,237,.08);border-radius:20px;padding:3px}
  .viewtoggle button{border:none;background:transparent;color:var(--m-accent);font-size:13px;font-weight:800;padding:5px 11px;border-radius:18px;cursor:pointer}
  .viewtoggle button.on{background:var(--m-accent);color:#fff;box-shadow:0 2px 8px rgba(124,58,237,.3)}
  #bookView{padding:14px 8px 0;display:flex;flex-direction:column;align-items:center}
  .bookwrap{position:relative;width:100%;max-width:860px;perspective:1800px;display:flex;align-items:stretch;gap:4px}
  .book{flex:1;min-height:60vh;background:linear-gradient(170deg,#fff,#fdf8f4);border-radius:8px 18px 18px 8px;box-shadow:0 10px 34px rgba(80,60,120,.18),inset 7px 0 16px -8px rgba(124,58,237,.18);border-left:5px solid #ece4f5;padding:16px 16px 20px;transform-style:preserve-3d;transition:transform .22s ease,opacity .22s ease;backface-visibility:hidden}
  .book.flip-next{transform:rotateY(-20deg);opacity:.25}
  .book.flip-prev{transform:rotateY(20deg);opacity:.25}
  .page-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
  @media(min-width:720px){ .page-grid{grid-template-columns:repeat(3,1fr)} .book{min-height:66vh} }
  .page-title{font-size:16px;font-weight:900;color:var(--m-accent);display:flex;align-items:center;gap:8px;margin-bottom:12px;padding-bottom:8px;border-bottom:2px dashed rgba(124,58,237,.2)}
  .page-title::before{content:'';width:6px;height:20px;background:linear-gradient(var(--m-accent2),var(--m-accent3));border-radius:6px}
  .nav{flex:0 0 auto;width:38px;border:none;background:rgba(255,255,255,.85);color:var(--m-accent);font-size:26px;font-weight:900;border-radius:14px;cursor:pointer;box-shadow:0 3px 12px rgba(80,60,120,.14);align-self:center;height:90px}
  .nav:disabled{opacity:.25;cursor:default}
  .pageind{margin:12px 0 4px;font-size:12.5px;color:#9a8aa8;font-weight:700;letter-spacing:.4px}
  .cover{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:14px;min-height:54vh}
  .cover .ttl{font-size:26px;font-weight:900;color:var(--m-accent);line-height:1.2}
  .cover .hint{font-size:13px;color:#9a8aa8;font-weight:700;animation:bob 1.6s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(5px)}}
  .cover .open{border:none;background:linear-gradient(135deg,#8b5cf6,#7c3aed);color:#fff;border-radius:14px;padding:12px 26px;font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 4px 14px rgba(124,58,237,.3)}
  .endpage{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:14px;min-height:54vh}
</style>
</head>
<body>
<div id="adminBar" style="display:none;"></div>
<div id="loader"><div class="bunscene"><div class="bun">🐇</div><span class="puff">💨</span><div class="carrot3">🥕</div><div class="ground"></div></div><div class="lt">กำลังโหลดเมนู<span class="dots"></span></div></div>
<header><img id="shopLogo" alt="" style="display:none;height:52px;border-radius:10px;object-fit:contain;margin-bottom:6px;"><h1 id="shopName">กำลังโหลดเมนู…</h1><div class="sub" id="shopSub">สั่งออนไลน์ · รับที่ร้าน</div>
  <button class="hl-chip" id="hlChip" style="display:none" onclick="reopenShowcase()">✨ ไฮไลต์เดือนนี้</button>
  <div class="viewtoggle"><button id="vbBook" class="on" onclick="setView('book')">📖 เล่ม</button><button id="vbGrid" onclick="setView('grid')">▦ ตาราง</button></div>
</header>
<div id="bookView">
  <div class="bookwrap">
    <button class="nav nav-prev" id="navPrev" onclick="goPage(-1)">‹</button>
    <div class="book" id="book"></div>
    <button class="nav nav-next" id="navNext" onclick="goPage(1)">›</button>
  </div>
  <div class="pageind" id="pageInd"></div>
</div>
<div id="gridwrap"><div class="foldertabs" id="foldertabs" style="display:none"></div><div class="grid" id="grid" style="display:none"></div></div>
<div id="showcase"></div>
<div class="cartbar"><b id="cartSummary">ตะกร้า ฿0</b><button id="cartBtn" disabled onclick="openCart()">ดูตะกร้า</button></div>

<div class="modal" id="cartModal"><div class="sheet" id="sheet"></div></div>
<div id="tocModal"><div class="toc-sheet" id="tocSheet"></div></div>

<script>
const TOKEN = location.pathname.split('/').filter(Boolean).pop();
const QS = new URLSearchParams(location.search);
const KIOSK = QS.get('kiosk') === '1';
let MENU = [], CART = [], PAYMENT = { mode: 'postpay', promptpay: '' };
let CONFIG = { theme:'recipro', frame:'soft', promos:[], showcaseOn:false, bg:'', accent:'', tabPos:'top', showcase_slots:[] };
let catFilter = '';   // '' = ทุกหมวด (แท็บโฟลเดอร์)
let pendingItem = null, pendingSel = {}, LAST_ORDER = null;

// ใช้ธีม/กรอบจาก config ของร้าน (เพิ่ม ไม่ลบ — ค่าเริ่มต้น = ธีม recipro เดิม)
function applyConfig(cfg){
  CONFIG = Object.assign(CONFIG, cfg || {});
  const root = document.documentElement;
  if (CONFIG.theme && CONFIG.theme !== 'recipro') root.setAttribute('data-theme', CONFIG.theme); else root.removeAttribute('data-theme');
  if (CONFIG.frame && CONFIG.frame !== 'soft') root.setAttribute('data-frame', CONFIG.frame); else root.removeAttribute('data-frame');
  // สีปรับเอง (ทับธีม) — พื้นเมนู + สีหลัก/หัวการ์ด (โทนสว่าง)
  const sv = (k, v) => { if (v) root.style.setProperty(k, v); else root.style.removeProperty(k); };
  sv('--m-bg1', CONFIG.bg); sv('--m-bg2', CONFIG.bg);
  sv('--m-accent', CONFIG.accent); sv('--m-accent2', CONFIG.accent); sv('--m-accent3', CONFIG.accent);
  document.body.setAttribute('data-tabpos', (CONFIG.tabPos === 'left' || CONFIG.tabPos === 'right') ? CONFIG.tabPos : 'top');
  if (KIOSK) document.body.classList.add('kiosk');
}
const fmt = n => '฿' + Number(n||0).toLocaleString('th-TH');
const esc = s => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const hueOf = s => { let h=0; for(let i=0;i<String(s).length;i++) h=(h*31+String(s).charCodeAt(i))%360; return h; };

async function load(){
  try{
    const r = await fetch('/public/menu/'+TOKEN);
    if(!r.ok){ document.getElementById('shopName').textContent='ไม่พบเมนู หรือร้านปิดรับออนไลน์'; hideLoader(); return; }
    const d = await r.json();
    document.getElementById('shopName').textContent = d.shop_name || 'เมนู';
    MENU = d.items || [];
    if (d.payment) PAYMENT = d.payment;
    if (d.menu) applyConfig(d.menu);
    if (d.logo) { const l = document.getElementById('shopLogo'); l.src = d.logo; l.style.display = 'block'; }
    renderMenu();
    maybeShowShowcase();
  }catch(e){ document.getElementById('shopName').textContent='โหลดเมนูไม่สำเร็จ'; hideLoader(); }
}
function hideLoader(){ const l=document.getElementById('loader'); if(l){ l.classList.add('hide'); setTimeout(()=>l.remove(),450); } }
// การ์ดเมนู — แตะทั้งใบเพื่อดูรายละเอียดแล้วค่อยสั่ง (ไม่มีปุ่มสั่งบนการ์ด, ไม่โชว์รายละเอียดบนการ์ด)
// ป้ายบนการ์ด — "มีตัวเลือก" อัตโนมัติ + ป้ายที่ร้านตั้งเอง (แนะนำ/ขายดี/ใหม่/Limited/Seasonal/Promotion)
const BADGE_CLASS = { 'ขายดี':'hot', 'แนะนำ':'reco', 'ใหม่':'new', 'new':'new', 'limited':'limited', 'seasonal':'seasonal', 'promotion':'promo', 'โปรโมชั่น':'promo' };
function itemBadges(it){
  const out = [];
  const shopBadges = Array.isArray(it.badges) ? it.badges : [];
  shopBadges.slice(0,3).forEach(b => { const label = String(b||'').trim(); if(!label) return;
    const cls = BADGE_CLASS[label] || BADGE_CLASS[label.toLowerCase()] || ''; out.push(`<span class="bdg ${cls}">${esc(label)}</span>`); });
  if (it.options && it.options.length) out.push('<span class="bdg opt">มีตัวเลือก</span>');
  return out.join('');
}
// การ์ดเมนู — รูปด้านบน (ไม่มีตัวอักษรทับรูป) · ชื่อ/ป้าย/ราคาอยู่ใต้รูป · แตะทั้งใบเพื่อดูรายละเอียดแล้วสั่ง
function itemCard(it, i){
  const h = hueOf(it.name || 'x');
  const hasImg = !!it.img;
  const bg = hasImg ? `background-image:url('${esc(it.img)}')` : `background:linear-gradient(135deg,hsl(${h} 70% 64%),hsl(${(h + 45) % 360} 72% 52%))`;
  const ph = hasImg ? '' : `<span class="ph">${esc((it.name||'เมนู').slice(0,2))}</span>`;
  const badges = itemBadges(it);
  return `<div class="card" style="animation-delay:${Math.min(i*40,400)}ms" onclick="openDetail('${it.id}')">
      <div class="img" style="${bg}">${ph}</div>
      <div class="b">
        <div class="nm">${esc(it.name)}</div>
        ${badges ? `<div class="badges">${badges}</div>` : ''}
        <div class="pr-row"><span class="pr">${fmt(it.price)}</span><span class="more">ดูรายละเอียด ›</span></div>
      </div></div>`;
}
function menuCats(){
  const seen=[]; MENU.forEach(it=>{ const c=it.category||''; if(c && !seen.includes(c)) seen.push(c); }); return seen;
}
function renderFolderTabs(){
  const bar=document.getElementById('foldertabs'); if(!bar) return;
  const cats=menuCats();
  // โชว์แท็บเฉพาะโหมดตาราง + มีหมวดตั้งแต่ 2 ขึ้นไป
  if(VIEW!=='grid' || cats.length<2){ bar.style.display='none'; return; }
  bar.style.display='flex';
  const tab=(key,label)=>`<button class="ftab${catFilter===key?' on':''}" onclick="setCatFilter('${key.replace(/'/g,"\\'")}')">${esc(label)}</button>`;
  const toc = cats.length>=2 ? `<button class="toc-btn" onclick="openToc()">☰ ดูหมวดทั้งหมด</button>` : '';
  bar.innerHTML = toc + tab('','📋 ทั้งหมด') + cats.map(c=>tab(c,c)).join('');
}
function setCatFilter(c){ catFilter=c; renderFolderTabs(); renderGrid(); window.scrollTo({top:0,behavior:'smooth'}); }
// 📚 สารบัญหมวด (ToC) — แตะหมวดเพื่อกระโดดไปหมวดนั้น
function catCount(c){ return MENU.filter(it=>(it.category||'')===c).length; }
function openToc(){
  const cats=menuCats();
  const row=(key,label,cnt)=>`<button class="toc-item" onclick="jumpCat('${String(key).replace(/'/g,"\\'")}')"><span class="dot"></span><span>${esc(label)}</span><span class="cnt">${cnt}</span></button>`;
  document.getElementById('tocSheet').innerHTML =
    `<div class="toc-h"><b>หมวดเมนูทั้งหมด</b><button class="toc-x" onclick="closeToc()">×</button></div>`
    + row('','📋 ทั้งหมด', MENU.length) + cats.map(c=>row(c,c,catCount(c))).join('');
  document.getElementById('tocModal').classList.add('open');
}
function closeToc(){ document.getElementById('tocModal').classList.remove('open'); }
function jumpCat(c){ closeToc(); if(VIEW!=='grid') setView('grid'); setCatFilter(c); }
function renderGrid(){
  const g = document.getElementById('grid'); let html=''; let lastCat=null;
  const list = catFilter ? MENU.filter(it=>(it.category||'')===catFilter) : MENU;
  list.forEach((it,i)=>{
    if(!catFilter && (it.category||'')!==lastCat){ lastCat=it.category||''; if(lastCat) html+=`<div class="cat">${esc(lastCat)}</div>`; }
    html += itemCard(it, i);
  });
  g.innerHTML = html || '<p class="muted" style="grid-column:1/-1;text-align:center;padding:30px">ยังไม่มีเมนู</p>';
}

// ===== โหมดเล่ม (flipbook) =====
let VIEW = 'book', PAGES = [], curPage = 0;
function perPage(){ return window.innerWidth >= 720 ? 6 : 4; }
function buildPages(){
  PAGES = [{ type:'cover' }];
  if (!MENU.length){ PAGES.push({ type:'empty' }); PAGES.push({ type:'end' }); return; }
  // จัดกลุ่มตามหมวด คงลำดับเดิม แล้วแบ่งหน้า
  const groups = []; let lastCat = null;
  MENU.forEach(it => {
    const c = it.category || '';
    if (c !== lastCat || !groups.length){ groups.push({ cat:c, items:[] }); lastCat = c; }
    groups[groups.length-1].items.push(it);
  });
  const pp = perPage();
  groups.forEach(g => {
    for (let i=0;i<g.items.length;i+=pp){
      PAGES.push({ type:'cat', cat:g.cat, items:g.items.slice(i,i+pp), part:i?Math.floor(i/pp)+1:0 });
    }
  });
  PAGES.push({ type:'end' });
}
function renderBook(){
  if (curPage >= PAGES.length) curPage = PAGES.length-1;
  if (curPage < 0) curPage = 0;
  const p = PAGES[curPage]; const book = document.getElementById('book');
  let html = '';
  if (p.type === 'cover'){
    const logo = document.getElementById('shopLogo');
    const logoHtml = (logo && logo.src && logo.style.display!=='none') ? `<img src="${esc(logo.src)}" style="height:72px;border-radius:14px;object-fit:contain">` : '🍵';
    html = `<div class="cover"><div style="font-size:46px">${logoHtml}</div>
      <div class="ttl">${esc(document.getElementById('shopName').textContent || 'เมนูร้าน')}</div>
      <div class="muted">สั่งออนไลน์ · รับที่ร้าน</div>
      <button class="open" onclick="goPage(1)">เปิดเมนู →</button>
      <div class="hint">แตะขอบซ้าย-ขวา หรือปัดนิ้วเพื่อพลิกหน้า</div></div>`;
  } else if (p.type === 'empty'){
    html = `<div class="endpage"><div style="font-size:40px">🥕</div><div class="muted">ยังไม่มีเมนู</div></div>`;
  } else if (p.type === 'end'){
    html = `<div class="endpage"><div style="font-size:40px">🙏</div>
      <div class="ttl" style="font-size:20px">ขอบคุณที่แวะชม</div>
      <div class="muted">เลือกเมนูแล้วกด “ดูตะกร้า” ด้านล่างเพื่อสั่งได้เลย</div>
      <button class="open" onclick="goPage(-1)">← กลับไปดูเมนู</button></div>`;
  } else {
    const title = p.cat ? esc(p.cat) + (p.part?` (ต่อ ${p.part})`:'') : 'เมนูแนะนำ';
    html = `<div class="page-title">${title}</div><div class="page-grid">${p.items.map((it,i)=>itemCard(it,i)).join('')}</div>`;
  }
  book.innerHTML = html;
  document.getElementById('navPrev').disabled = curPage===0;
  document.getElementById('navNext').disabled = curPage===PAGES.length-1;
  document.getElementById('pageInd').textContent = `หน้า ${curPage+1} / ${PAGES.length}`;
}
function goPage(delta){
  const next = Math.max(0, Math.min(PAGES.length-1, curPage+delta));
  if (next === curPage) return;
  const dir = next > curPage ? 1 : -1;
  const book = document.getElementById('book');
  book.classList.add(dir>0 ? 'flip-next' : 'flip-prev');
  setTimeout(()=>{ curPage = next; renderBook(); book.classList.remove('flip-next','flip-prev'); window.scrollTo({top:0,behavior:'smooth'}); }, 200);
}
function setView(v){
  VIEW = v;
  document.getElementById('vbBook').classList.toggle('on', v==='book');
  document.getElementById('vbGrid').classList.toggle('on', v==='grid');
  document.getElementById('bookView').style.display = v==='book' ? 'flex' : 'none';
  document.getElementById('grid').style.display = v==='grid' ? 'grid' : 'none';
  if (v==='book') renderBook(); else renderGrid();
  renderFolderTabs();
}
// ===== 🎉 Marketing Showcase (สูงสุด 4 สไลด์) — โชว์ตอนเปิดครั้งแรก แล้วเข้าเมนู =====
// สไลด์ถูกกรอง/ตัดเวลา/ตรวจ target ฝั่งเซิร์ฟเวอร์แล้ว (menu-showcase.js) — ที่นี่แค่แสดงผล ไม่มีลอจิกส่วนลด
let SC_SLOTS = [], scIdx = 0;
function scKey(){ return 'recipro_sc_' + TOKEN; }
function scSeenThisSession(){ try{ return sessionStorage.getItem(scKey())==='1'; }catch(e){ return false; } }
function scMarkSeen(){ try{ sessionStorage.setItem(scKey(),'1'); }catch(e){} }
// ใช้ showcase_slots ที่กรองมาแล้ว · fallback = promos เดิม (เข้ากันได้ย้อนหลังกับร้านที่ยังไม่ตั้งสไลด์ใหม่)
function buildShowcaseSlots(){
  const slots = Array.isArray(CONFIG.showcase_slots) ? CONFIG.showcase_slots.filter(s=>s && (s.image||s.title)) : [];
  if(slots.length) return slots.slice(0,4);
  if(CONFIG.showcaseOn){
    return (CONFIG.promos||[]).filter(p=>p&&p.img).slice(0,4).map((p,i)=>({
      id:'promo'+i, type:'CUSTOM', title:'', description:'', image:p.img, badge:'', cta_label:'',
      target_type: p.link?'PROMOTION':'NONE', target_id:null, _link:p.link||'' }));
  }
  return [];
}
function maybeShowShowcase(){
  SC_SLOTS = buildShowcaseSlots();
  const chip = document.getElementById('hlChip');
  if(chip) chip.style.display = SC_SLOTS.length ? 'inline-flex' : 'none';
  if(!SC_SLOTS.length) return;          // ไม่มีสไลด์ → เข้าเมนูตรง ๆ (ไม่บังคับ)
  if(scSeenThisSession()) return;        // เปิดซ้ำในเซสชันเดิม → ไม่บังคับให้ดูอีก
  openShowcase(0);
}
function openShowcase(i){
  if(!SC_SLOTS.length) return;
  scIdx = Math.max(0, Math.min(SC_SLOTS.length-1, i||0));
  renderShowcase();
  document.getElementById('showcase').classList.add('open');
}
function reopenShowcase(){ SC_SLOTS = buildShowcaseSlots(); if(SC_SLOTS.length) openShowcase(0); }
const SC_BADGE_DEFAULT = { PROMOTION:'โปรโมชั่น', PRODUCT_OF_MONTH:'เมนูประจำเดือน', NEW:'ใหม่', SEASONAL:'ตามฤดูกาล', LIMITED:'จำนวนจำกัด', BEST_SELLER:'ขายดี', RECOMMENDED:'แนะนำ', BRAND_STORY:'เรื่องราวของร้าน', CUSTOM:'' };
function scCtaLabel(s){
  if(s.cta_label) return s.cta_label;
  if(s.target_type==='MENU_ITEM') return 'สั่งเมนูนี้';
  if(s.target_type==='CATEGORY') return 'ดูหมวดนี้';
  if(s.target_type==='PROMOTION') return 'ดูโปรโมชั่น';
  return 'ดูเมนู';
}
function renderShowcase(){
  const s = SC_SLOTS[scIdx]; if(!s) return;
  const badge = s.badge || SC_BADGE_DEFAULT[s.type] || '';
  const hero = s.image ? `<img class="sc-hero" src="${esc(s.image)}" alt="">` : `<div class="sc-hero"></div>`;
  const dots = SC_SLOTS.map((_,i)=>`<i class="${i===scIdx?'on':''}" onclick="openShowcase(${i})"></i>`).join('');
  document.getElementById('showcase').innerHTML = `
    <div class="sc-top"><b style="color:var(--m-accent);font-weight:900;font-size:16px">${esc(document.getElementById('shopName').textContent||'')}</b>
      <button class="sc-skip" onclick="enterMenu()">ข้าม ✕</button></div>
    <div class="sc-stage"><div class="sc-card">
      ${hero}
      ${badge?`<span class="sc-badge">${esc(badge)}</span>`:''}
      ${s.title?`<div class="sc-tt">${esc(s.title)}</div>`:''}
      ${s.description?`<div class="sc-ds">${esc(s.description)}</div>`:''}
      <button class="sc-cta" onclick="scCta()">${esc(scCtaLabel(s))}</button>
    </div></div>
    <div class="sc-nav">
      <button onclick="scMove(-1)" ${scIdx===0?'disabled':''} aria-label="ก่อนหน้า">‹</button>
      <div class="sc-dots">${dots}</div>
      <button onclick="scMove(1)" ${scIdx===SC_SLOTS.length-1?'disabled':''} aria-label="ถัดไป">›</button>
    </div>
    <div class="sc-foot"><button onclick="enterMenu()">ดูเมนูทั้งหมด →</button></div>`;
}
function scMove(d){ openShowcase(scIdx+d); }
function scCta(){
  const s = SC_SLOTS[scIdx]; if(!s){ enterMenu(); return; }
  if(s.target_type==='MENU_ITEM' && s.target_id){ const it=MENU.find(x=>x.id===s.target_id); enterMenu(); if(it) openDetail(it.id); return; }
  if(s.target_type==='CATEGORY' && s.target_id){ enterMenu(); jumpCat(s.target_id); return; }
  if(s.target_type==='PROMOTION'){ if(s._link){ try{ window.open(s._link,'_blank','noopener'); }catch(e){} } enterMenu(); return; }
  enterMenu();   // NONE (หรืออื่น ๆ) → เข้าเมนู
}
function enterMenu(){ scMarkSeen(); const sc=document.getElementById('showcase'); if(sc) sc.classList.remove('open'); window.scrollTo({top:0}); }
function renderMenu(){ if(KIOSK) VIEW='grid'; renderGrid(); buildPages(); curPage=0; renderBook(); setView(VIEW); hideLoader(); }
// ปัดนิ้ว + แตะขอบ + ปุ่มลูกศรคีย์บอร์ด
(function(){
  const wrap = () => document.querySelector('.bookwrap'); let x0=null;
  document.addEventListener('touchstart', e => { if(VIEW==='book' && wrap() && wrap().contains(e.target)) x0 = e.touches[0].clientX; }, {passive:true});
  document.addEventListener('touchend', e => {
    if(x0===null) return; const dx = e.changedTouches[0].clientX - x0; x0=null;
    if(Math.abs(dx) > 45) goPage(dx<0 ? 1 : -1);
  }, {passive:true});
  document.addEventListener('keydown', e => { if(VIEW!=='book') return; if(e.key==='ArrowRight') goPage(1); if(e.key==='ArrowLeft') goPage(-1); });
  let rt; window.addEventListener('resize', () => { clearTimeout(rt); rt=setTimeout(()=>{ if(!MENU.length) return; buildPages(); if(curPage>=PAGES.length)curPage=PAGES.length-1; if(VIEW==='book')renderBook(); }, 200); });
})();
// เพิ่มเมนู — ถ้ามีตัวเลือก เปิดให้เลือกก่อน
function addItem(id){ const it=MENU.find(x=>x.id===id); if(!it) return; if(it.options&&it.options.length){ openOptionSheet(it); } else addLine(it,[]); }
function openOptionSheet(it){ pendingItem=it; pendingSel={}; renderOptionSheet(); document.getElementById('cartModal').classList.add('open'); }
// แตะการ์ดเข้าดูรายละเอียด/คำแนะนำ + เลือก option (ใช้ชีตเดียวกับ option)
function openDetail(id){ const it=MENU.find(x=>x.id===id); if(!it) return; openOptionSheet(it); }
function toggleSel(gid,cid,single){ const cur=pendingSel[gid]||[]; pendingSel[gid]= single?[cid]:(cur.includes(cid)?cur.filter(x=>x!==cid):cur.concat(cid)); renderOptionSheet(); }
function optExtra(){ let s=0; (pendingItem.options||[]).forEach(g=>(pendingSel[g.id]||[]).forEach(cid=>{const c=g.choices.find(x=>x.id===cid); if(c)s+=c.price_add;})); return s; }
function renderOptionSheet(){
  const it=pendingItem; if(!it) return;
  const groupsHtml=(it.options||[]).map(g=>{ const single=(g.select_type||'single')!=='multi';
    return `<div style="margin-top:12px"><div style="font-weight:700;font-size:14px">${esc(g.label)}${g.required?' <span style="color:#dc2626">*</span>':''} <span class="muted">(${single?'เลือก 1':'เลือกได้หลาย'})</span></div>
      ${g.choices.map(c=>{ const on=(pendingSel[g.id]||[]).includes(c.id);
        return `<label class="row" style="cursor:pointer"><span style="flex:1">${esc(c.label)}${c.price_add?` <span class="muted">(+${fmt(c.price_add)})</span>`:''}</span>
          <input type="${single?'radio':'checkbox'}" name="g${g.id}" ${on?'checked':''} onclick="toggleSel('${g.id}','${c.id}',${single})" style="width:auto;margin:0"></label>`; }).join('')}</div>`; }).join('');
  const imgHtml = it.img ? `<img class="sd-img" src="${esc(it.img)}" alt="${esc(it.name)}">` : '';
  const descHtml = it.detail ? `<div class="sd-desc">${esc(it.detail)}</div>` : '';
  const revHtml = it.link ? `<a class="sd-rev" href="${esc(it.link)}" target="_blank" rel="noopener">★ ดูรีวิว/รายละเอียดเพิ่มเติม →</a>` : '';
  document.getElementById('sheet').innerHTML=`${imgHtml}<h2 style="font-size:19px">${esc(it.name)}</h2><div class="muted" style="font-size:16px;font-weight:700;color:var(--m-price)">${fmt(it.price)}</div>${revHtml}${descHtml}${groupsHtml}
    <button class="paybtn" onclick="confirmOption()">เพิ่มลงตะกร้า · ${fmt(it.price+optExtra())}</button>`;
}
function confirmOption(){
  const it=pendingItem; if(!it) return;
  for(const g of (it.options||[])){ if(g.required && !(pendingSel[g.id]||[]).length){ alert('กรุณาเลือก: '+g.label); return; } }
  const opts=[]; (it.options||[]).forEach(g=>(pendingSel[g.id]||[]).forEach(cid=>{const c=g.choices.find(x=>x.id===cid); if(c)opts.push({group_id:g.id,choice_id:c.id,label:c.label,price_add:c.price_add});}));
  addLine(it,opts); pendingItem=null; document.getElementById('cartModal').classList.remove('open');
}
function lineKey(id,opts){ return id+'|'+opts.map(o=>o.choice_id).sort().join(','); }
function linePrice(l){ return l.base + l.opts.reduce((s,o)=>s+(o.price_add||0),0); }
function addLine(it,opts){ const key=lineKey(it.id,opts); const ex=CART.find(l=>l.key===key); if(ex) ex.qty++; else CART.push({key,id:it.id,type:it.type,name:it.name,base:it.price,opts,qty:1}); updateBar(); }
function setQty(key,d){ const l=CART.find(x=>x.key===key); if(!l) return; l.qty+=d; if(l.qty<=0) CART=CART.filter(x=>x.key!==key); updateBar(); if(CART.length) openCart(); else document.getElementById('cartModal').classList.remove('open'); }
function cartTotal(){ return CART.reduce((s,l)=>s+linePrice(l)*l.qty,0); }
function cartCount(){ return CART.reduce((a,l)=>a+l.qty,0); }
function updateBar(){
  document.getElementById('cartSummary').textContent = `ตะกร้า ${cartCount()} รายการ · ${fmt(cartTotal())}`;
  document.getElementById('cartBtn').disabled = cartCount()===0;
}
function openCart(){
  // อ่านง่าย: ชื่อเมนู · ตัวเลือกที่เลือก · ราคาต่อหน่วย × จำนวน · ราคารวมบรรทัด (ไม่ใช่ชื่อยาวก้อนเดียว)
  const rows = CART.map(l=>{ const optTxt=l.opts.map(o=>o.label).join(' · ');
    return `<div class="row">
      <div style="flex:1;min-width:0">
        <div style="font-weight:700;line-height:1.3">${esc(l.name)}</div>
        ${optTxt?`<div class="muted" style="font-size:12px;margin-top:2px">${esc(optTxt)}</div>`:''}
        <div class="muted" style="font-size:11.5px;margin-top:2px">${fmt(linePrice(l))} × ${l.qty}</div>
      </div>
      <div style="text-align:right;white-space:nowrap;font-weight:800">${fmt(linePrice(l)*l.qty)}</div>
      <span class="q"><button onclick="setQty('${l.key}',-1)">−</button>${l.qty}<button onclick="setQty('${l.key}',1)">+</button></span></div>`;
  }).join('');
  document.getElementById('sheet').innerHTML = `<h2 style="font-size:18px;margin-bottom:8px">ตะกร้าของคุณ</h2>${rows}
    <div class="row" style="font-weight:800;border:none"><span style="flex:1">รวม</span><span>${fmt(cartTotal())}</span></div>
    <input id="cName" placeholder="ชื่อผู้สั่ง"><input id="cPhone" placeholder="เบอร์โทร (ไม่บังคับ)">
    <textarea id="cNote" rows="2" placeholder="หมายเหตุ (ไม่บังคับ)"></textarea>
    <button class="paybtn" onclick="submitOrder()">${PAYMENT.mode === 'prepay' ? 'ยืนยันสั่ง · โอนเงิน' : 'ยืนยันสั่ง · รับที่ร้าน'}</button>
    <p class="muted" style="text-align:center;margin-top:8px">${PAYMENT.mode === 'prepay' ? 'โอนก่อนรับของ — จะมี QR พร้อมเพย์หลังกดสั่ง' : 'จ่ายเงินตอนรับของที่ร้าน'}</p>`;
  document.getElementById('cartModal').classList.add('open');
}
document.getElementById('cartModal').onclick = e => { if(e.target.id==='cartModal') e.currentTarget.classList.remove('open'); };
document.getElementById('tocModal').onclick = e => { if(e.target.id==='tocModal') closeToc(); };
// ปัดซ้าย-ขวาบน Showcase เพื่อเปลี่ยนสไลด์
(function(){
  const sc = document.getElementById('showcase'); if(!sc) return; let x0=null;
  sc.addEventListener('touchstart', e => { if(sc.classList.contains('open')) x0 = e.touches[0].clientX; }, {passive:true});
  sc.addEventListener('touchend', e => { if(x0===null) return; const dx=e.changedTouches[0].clientX-x0; x0=null; if(Math.abs(dx)>45) scMove(dx<0?1:-1); }, {passive:true});
})();
async function submitOrder(){
  const items = CART.map(l => ({ id:l.id, type:l.type, name:l.name, price:linePrice(l), qty:l.qty, options:l.opts }));
  const body = { customer_name: document.getElementById('cName').value, customer_phone: document.getElementById('cPhone').value, note: document.getElementById('cNote').value, items };
  try{
    const r = await fetch('/public/order/'+TOKEN, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
    const d = await r.json();
    if(!r.ok){ alert(d.error||'สั่งไม่สำเร็จ'); return; }
    const pay = d.payment || PAYMENT;
    const prepay = pay.mode === 'prepay' && pay.promptpay;
    const qrBlock = prepay
      ? `<div style="margin:10px 0;"><img src="https://promptpay.io/${encodeURIComponent(pay.promptpay)}/${Number(d.total).toFixed(2)}.png" alt="PromptPay QR" style="width:200px;height:200px;border:1px solid #ddd;border-radius:10px;background:#fff;padding:6px;"></div>
         <p class="muted">สแกนพร้อมเพย์เพื่อโอน ${fmt(d.total)} แล้วแจ้งสลิปกับร้าน · ร้านจะเริ่มทำเมื่อยืนยันยอด</p>`
      : `<div style="margin:10px 0;padding:12px 14px;border-radius:14px;background:#fef3c7;border:1.5px solid #f6c453;color:#92400e;font-weight:700;font-size:14px;">💵 กรุณาติดต่อชำระเงินที่เคาน์เตอร์<div style="font-weight:400;font-size:12px;margin-top:3px;">แจ้งหมายเลขคิวกับพนักงาน · ร้านจะเริ่มทำหลังรับชำระ</div></div>`;
    LAST_ORDER = { order_no: d.order_no, queue: d.queue_number, total: d.total, name: body.customer_name || '', note: body.note || '',
      shop: document.getElementById('shopName').textContent || 'ร้าน', items: items.map(it => ({ name: it.name, qty: it.qty, price: it.price, options: it.options })) };
    document.getElementById('sheet').innerHTML = `<div class="done"><div>สั่งสำเร็จ! 🎉</div>
      <div class="qn">คิว ${d.queue_number}</div>
      <div>เลขออเดอร์ ${esc(d.order_no)}</div><div style="margin:8px 0">ยอดรวม ${fmt(d.total)}</div>
      ${qrBlock}
      <button class="paybtn" style="background:#16a34a" onclick="saveBillPdf()">💾 บันทึกบิล (PDF)</button>
      <button class="paybtn" onclick="location.reload()">สั่งเพิ่ม</button></div>`;
    CART=[]; updateBar();
  }catch(e){ alert('สั่งไม่สำเร็จ ลองใหม่'); }
}
// บันทึกบิลเป็น PDF บนมือถือลูกค้า — เปิดหน้าต่างพิมพ์ (มือถือเลือก "บันทึกเป็น PDF" ได้)
function saveBillPdf(){
  const o = LAST_ORDER; if(!o){ alert('ยังไม่มีบิล'); return; }
  const rows = o.items.map(it=>{ const opt=(it.options||[]).map(x=>(x&&x.label)||x).join(', ');
    return `<tr><td>${esc(it.name)}${opt?`<div class="o">${esc(opt)}</div>`:''}</td><td class="c">${it.qty}</td><td class="r">${fmt(it.price*it.qty)}</td></tr>`; }).join('');
  const html = `<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
    <title>บิล ${esc(o.order_no)}</title><style>
    *{font-family:'Sarabun','Segoe UI',sans-serif;margin:0;box-sizing:border-box}
    body{padding:16px;color:#111;max-width:420px;margin:auto}
    .h{text-align:center;border-bottom:2px dashed #999;padding-bottom:10px;margin-bottom:10px}
    .h .nm{font-size:20px;font-weight:800}.h .q{font-size:34px;font-weight:900;color:#7c3aed;margin-top:4px}
    table{width:100%;border-collapse:collapse;font-size:14px;margin-top:6px}td{padding:6px 2px;vertical-align:top;border-bottom:1px dotted #ccc}
    .c{text-align:center;width:38px}.r{text-align:right;white-space:nowrap}.o{font-size:12px;color:#777}
    .tot{display:flex;justify-content:space-between;font-size:17px;font-weight:800;margin-top:10px;border-top:2px solid #000;padding-top:8px}
    .meta{font-size:12px;color:#666;margin-top:8px;text-align:center}
    @media print{.noprint{display:none}}
    .noprint{display:block;width:100%;padding:13px;margin-top:16px;border:none;border-radius:10px;background:#7c3aed;color:#fff;font-size:15px;font-weight:800}
    </style></head><body>
    <div class="h"><div class="nm">${esc(o.shop)}</div><div style="font-size:12px;color:#777">ใบรับออเดอร์</div><div class="q">คิว ${esc(String(o.queue))}</div></div>
    <div style="font-size:12px;color:#666">เลขออเดอร์ ${esc(o.order_no)}${o.name?` · ${esc(o.name)}`:''}</div>
    <table>${rows}</table>
    <div class="tot"><span>รวม</span><span>${fmt(o.total)}</span></div>
    ${o.note?`<div class="meta">หมายเหตุ: ${esc(o.note)}</div>`:''}
    <div class="meta">ขอบคุณที่ใช้บริการ 🙏</div>
    <button class="noprint" onclick="window.print()">💾 บันทึก / พิมพ์บิล</button>
    <scr`+`ipt>setTimeout(function(){window.print()},500)<\/scr`+`ipt></body></html>`;
  const w = window.open('','_blank');
  if(!w){ alert('กรุณาอนุญาต popup เพื่อบันทึกบิล'); return; }
  w.document.write(html); w.document.close();
}
// Admin-only preview bar — customer/kiosk view is unaffected. Requires BOTH ?preview=admin AND a
// server-verified authenticated owner/admin of THIS shop (the query param alone grants nothing).
async function maybeShowAdminPreview(){
  try{
    if (QS.get('preview') !== 'admin' || KIOSK) return;            // trigger; never in kiosk mode
    let token = null; try { token = localStorage.getItem('recipro_access'); } catch(e){}
    if (!token) return;                                            // unauthenticated → plain customer view
    const r = await fetch('/api/preview/verify/'+encodeURIComponent(TOKEN), { headers:{ 'Authorization':'Bearer '+token } });
    if (!r.ok) return;                                             // 401/403/404 → no bar (customer view)
    const v = await r.json(); if (!v || !v.ok) return;             // server did not confirm admin of THIS shop
    const bar = document.getElementById('adminBar');
    const customerUrl = '/menu/' + TOKEN;
    bar.innerHTML = '<div style="position:sticky;top:0;z-index:99999;display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:#4338ca;color:#fff;padding:8px 14px;font-size:13px;font-family:inherit;box-shadow:0 2px 8px rgba(0,0,0,.25);">'
      + '<span style="font-weight:700;">👁 โหมดตัวอย่างสำหรับผู้ดูแล' + (v.shop_name ? (' · ' + esc(v.shop_name)) : '') + '</span>'
      + '<span style="flex:1;"></span>'
      + '<button onclick="location.href=\'' + (v.back_url || '/') + '\'" style="background:#fff;color:#4338ca;border:0;border-radius:8px;padding:6px 12px;font-weight:700;cursor:pointer;font-family:inherit;">← กลับระบบหลังบ้าน</button>'
      + '<button onclick="location.href=\'' + customerUrl + '\'" style="background:transparent;color:#fff;border:1px solid #fff;border-radius:8px;padding:6px 12px;cursor:pointer;font-family:inherit;">เปิดหน้าลูกค้าแบบจริง</button>'
      + '</div>';
    bar.style.display = 'block';
  }catch(e){ /* any failure → stay in customer view */ }
}
load();
maybeShowAdminPreview();
</script>
